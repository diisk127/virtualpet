<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Virtual Pet</title>
  <style>
    /* ====== CSS จากคุณรวมแล้ว ====== */
    body {
      margin: 0;
      padding: 0;
      background: url("https://i.pinimg.com/1200x/f7/a1/8e/f7a18ee3567d8b7ddee1f46b26f89e1c.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: "Arial", sans-serif;
    }

    .container {
      max-width: 800px;
      margin: auto;
      margin-top: 50px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }

    .status {
      text-align: left;
      margin: 20px 0;
    }

    .status label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
    }

    progress {
      width: 100%;
      height: 20px;
    }

    .buttons button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #actionMessage {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .pet-image img {
      margin: 20px 0;
      border-radius: 50%;
      width: 150px;
    }

    #cat-info {
      margin-top: 30px;
      background: #fff3e0;
      padding: 15px;
      border-radius: 15px;
    }

    header {
      text-align: center;
      padding: 20px 0;
      color: #fff;
      text-shadow: 2px 2px #333;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
    }

    header p {
      margin: 5px 0 0;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>🐾 My Virtual Pet</h1>
    <p>Take care of your pet and learn fun cat facts!</p>
  </header>

  <!-- Main container -->
  <div class="container">
    <!-- Stats -->
    <div class="status">
      <label>Hunger</label>
      <progress id="hungerBar" value="{{ pet['hunger'] }}" max="100"></progress>
      <span id="hungerText">{{ pet['hunger'] }}</span>
      
      <label>Mood</label>
      <progress id="moodBar" value="{{ pet['mood'] }}" max="100"></progress>
      <span id="moodText">{{ pet['mood'] }}</span>
      
      <label>Hygiene</label>
      <progress id="hygieneBar" value="{{ pet['hygiene'] }}" max="100"></progress>
      <span id="hygieneText">{{ pet['hygiene'] }}</span>

      <label>Energy</label>
      <progress id="energyBar" value="{{ pet['energy'] }}" max="100"></progress>
      <span id="energyText">{{ pet['energy'] }}</span>
    </div>

    <!-- Pet image -->
    <div class="pet-image">
      <img id="petImg" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="pet">
    </div>

    <!-- Interaction buttons -->
    <div class="buttons">
      <button onclick="interact('feed')">🍖 Feed</button>
      <button onclick="interact('shower')">🛁 Shower</button>
      <button onclick="interact('play')">🎮 Play</button>
      <button onclick="interact('pet')">🐾 Pet</button>
    </div>

    <!-- Action message -->
    <div id="actionMessage"></div>

    <!-- Cat Facts -->
    <div id="cat-info">
      <h2>🐱 Fun Cat Fact</h2>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // ฟังก์ชันโต้ตอบกับ pet
    function interact(action) {
      fetch("/interact/" + action)
        .then(response => response.json())
        .then(pet => {
          document.getElementById("hungerBar").value = pet.hunger;
          document.getElementById("hungerText").innerText = pet.hunger;
          document.getElementById("moodBar").value = pet.mood;
          document.getElementById("moodText").innerText = pet.mood;
          document.getElementById("hygieneBar").value = pet.hygiene;
          document.getElementById("hygieneText").innerText = pet.hygiene;
          document.getElementById("energyBar").value = pet.energy;
          document.getElementById("energyText").innerText = pet.energy;
        });
    }

    // ฟังก์ชันดึง Cat Fact
    function getCatFact() {
      fetch('/cat_fact')
        .then(response => response.json())
        .then(data => {
          const catDiv = document.getElementById('cat-info');
          catDiv.innerHTML = "<h2>🐱 Fun Cat Fact</h2>";
          const factElement = document.createElement('p');
          factElement.textContent = data.fact;
          catDiv.appendChild(factElement);
        });
    }

    // ฟังก์ชันดึงรูป pet
    function updatePetImage() {
      fetch('/pet_image')
        .then(response => response.json())
        .then(data => {
          document.getElementById('petImg').src = data.image_url;
        });
    }

    // โหลดครั้งแรก
    window.onload = function() {
      getCatFact();
      updatePetImage();
    };
  </script>
</body>
</html>
